<!DOCTYPE html>
<html lang="zh-CN">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">


<title>数据安全上传 - 可信数据空间</title>
    <style>
        html{opacity:0;transition:opacity .15s ease-out}
        .header,.nav{background:#6a4ec8}
        [data-ico]{display:inline-block;width:24px;height:24px;vertical-align:middle}
    </style>
    <link rel="stylesheet" href="css/style.css?v=2">



<script src="js/icons.js?v=2"></script>
<script src="js/modal.js"></script>
<script src="js/auth.js"></script>

<script src="js/crypto.js"></script>

    <script src="js/permission.js"></script>
    <script src="js/file.js"></script>


</head>





<body onload="document.documentElement.style.opacity=1;checkLogin()">






<!-- 顶部栏 -->


<header class="header">

    <div class="logo">

        <span data-ico="lock"></span> 可信数据空间数据共享平台

    </div>


    <div class="user-info">

        当前用户：

        <span id="username"></span>


        <button
        class="logout"
        onclick="logout()">

            退出登录

        </button>

    </div>

</header>




<!-- 导航栏 -->


<nav class="nav">
    <a href="dataspace.html">首页</a>
    <a class="active">数据上传</a>
    <a href="data.html">数据查询</a>
    <a href="permission.html">权限管理</a>
    <a href="request.html">授权申请</a>
    <a href="log.html">访问日志</a>
</nav>






<!-- 主体 -->


<main class="container">


<!-- 页面介绍 -->


<section class="welcome">

<h1>

<span data-ico="folder"></span> 数据安全上传
</h1>


<p>
数据提供方上传数据文件后，
系统将自动完成数据标识、
完整性校验以及加密保护。
</p>

</section>





<!-- 上传区域 -->


<section class="upload-panel">


<h2>

上传数据文件
</h2>



<div class="upload-form">


<label>

数据名称
</label>


<input

type="text"

id="dataName"

placeholder="例如：医疗诊断数据">


<label class="form-label">选择文件</label>

<div class="file-upload-wrapper">
    <input type="file" id="fileInput" accept=".doc,.docx">
    <label for="fileInput" class="file-upload-label">
        <span class="file-upload-icon">📁</span>
        <span class="file-upload-text" id="fileName">点击选择或拖拽文件到此处</span>
    </label>
</div>


<label class="form-label">数据描述</label>
<textarea id="description" placeholder="请输入数据用途或说明"></textarea>


<button

class="primary-btn"

onclick="uploadFile()">

<span data-ico="lock"></span> 上传并加密

</button>


<p id="result"

class="upload-result">

</p>


</div>

</section>




<!-- 安全流程展示 -->


<section class="flow">


<h2>

数据保护流程
</h2>


<div class="flow-container">


<div class="flow-node">
    <span data-ico="file"></span>
    <div class="flow-node-text">
        <div class="flow-node-title">Word文件</div>
        <div class="flow-node-sub">数据输入</div>
    </div>
</div>

<div class="arrow">→</div>


<div class="flow-node">
    <span data-ico="search"></span>
    <div class="flow-node-text">
        <div class="flow-node-title">SHA-256</div>
        <div class="flow-node-sub">完整性校验</div>
    </div>
</div>

<div class="arrow">→</div>


<div class="flow-node">
    <span data-ico="lock"></span>
    <div class="flow-node-text">
        <div class="flow-node-title">AES</div>
        <div class="flow-node-sub">数据加密</div>
    </div>
</div>

<div class="arrow">→</div>


<div class="flow-node">
    <span data-ico="globe"></span>
    <div class="flow-node-text">
        <div class="flow-node-title">可信数据空间</div>
        <div class="flow-node-sub">安全存储</div>
    </div>
</div>

</div>

</section>




</main>




<footer>

© 2026 可信数据空间安全与隐私保护研究 Demo

</footer>




<script>

// 页面加载显示用户信息
window.onload = function() {
    let user = getCurrentUser();
    if (user) {
        document.getElementById("username").innerHTML = user.username + " (" + user.role + ")";
    }
}

// 文件选择后更新文件名显示
document.getElementById("fileInput").addEventListener("change", function(e) {
    let fileName = e.target.files[0] ? e.target.files[0].name : "点击选择或拖拽文件到此处";
    document.getElementById("fileName").textContent = fileName;
});

</script>


<script src="js/log.js"></script>
<script src="js/db.js"></script>
<script src="js/upload.js"></script>


</body>


</html>
