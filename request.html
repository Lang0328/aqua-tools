<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>数据授权申请 - 可信数据空间</title>
    <style>
        html{opacity:0;transition:opacity .15s ease-out}
        .header,.nav{background:#6a4ec8}
        [data-ico]{display:inline-block;width:24px;height:24px;vertical-align:-2px}
        h1,h2{display:flex;align-items:baseline;gap:10px}
        h1 [data-ico],h2 [data-ico]{width:26px;height:26px;vertical-align:baseline}
    </style>
    <link rel="stylesheet" href="css/style.css?v=2">
    <style>
        h1 .svg-ico,h2 .svg-ico{vertical-align:middle !important;margin-right:0 !important}
        .req-panel {
            background: rgba(255, 255, 255, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 35px;
            margin-top: 30px;
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.6);
            box-shadow: 0 8px 24px rgba(106, 78, 200, 0.1);
        }
        .req-form {
            display: flex;
            flex-direction: column;
            gap: 12px;
            max-width: 500px;
            width: 100%;
        }
        .req-form label {
            font-weight: bold;
            margin-top: 8px;
            color: #4a4266;
        }
        .req-form input, .req-form textarea {
            width: 100%;
            padding: 12px 14px;
            border: 1px solid rgba(155, 109, 255, 0.3);
            border-radius: 10px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.7);
            color: #333;
            transition: all .3s ease;
        }
        .req-form input:focus, .req-form textarea:focus {
            outline: none;
            border-color: #9b6dff;
            background: rgba(255, 255, 255, 0.9);
            box-shadow: 0 0 0 3px rgba(155, 109, 255, 0.12);
        }
        .req-form textarea {
            height: 100px;
            resize: vertical;
        }
        .req-table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
            min-width: 600px;
        }
        .req-table th, .req-table td {
            padding: 12px 15px;
            text-align: left;
            border-bottom: 1px solid rgba(155, 109, 255, 0.15);
            font-size: 14px;
            white-space: nowrap;
        }
        .req-table th {
            background: rgba(155, 109, 255, 0.15);
            color: #6a4ec8;
            font-weight: bold;
        }
        .req-table tr:hover {
            background: rgba(155, 109, 255, 0.06);
        }
        .badge-pending {
            background: #fff3cd;
            color: #856404;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-approved {
            background: #d4edda;
            color: #155724;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-rejected {
            background: #f8d7da;
            color: #721c24;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .badge-revoked {
            background: #e2e3e5;
            color: #383d41;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        .btn-approve {
            padding: 5px 14px;
            background: linear-gradient(135deg, #27ae60, #219150);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all .3s ease;
            box-shadow: 0 3px 8px rgba(39, 174, 96, 0.3);
        }
        .btn-approve:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(39, 174, 96, 0.4);
        }
        .btn-reject {
            padding: 5px 14px;
            background: linear-gradient(135deg, #e74c3c, #c0392b);
            color: white;
            border: none;
            border-radius: 20px;
            cursor: pointer;
            white-space: nowrap;
            transition: all .3s ease;
            box-shadow: 0 3px 8px rgba(231, 76, 60, 0.3);
        }
        .btn-reject:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 12px rgba(231, 76, 60, 0.4);
        }
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #9b8eb5;
        }
        .success-msg {
            padding: 12px;
            background: rgba(39, 174, 96, 0.15);
            color: #155724;
            border-radius: 10px;
            margin-top: 10px;
            border: 1px solid rgba(39, 174, 96, 0.25);
        }
        .duration-row {
            display: flex;
            align-items: center;
            gap: 14px;
            flex-wrap: wrap;
        }
        .duration-opt {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0;
            font-weight: 500;
            color: #4a4266;
            cursor: pointer;
            margin: 0 !important;
            padding: 6px 8px;
            white-space: nowrap;
            flex: 0 0 auto;
            min-width: max-content;
            line-height: 1;
        }
        .duration-opt > span {
            white-space: nowrap;
            display: inline-block;
            line-height: 1;
        }
        .duration-opt input[type="radio"] {
            accent-color: #6a4ec8;
            cursor: pointer;
            flex: 0 0 auto;
            margin: 0;
        }
        .duration-input, .duration-select {
            width: 100px;
            height: 40px;
            padding: 0 12px;
            border: 1px solid rgba(155, 109, 255, 0.3);
            border-radius: 10px;
            font-size: 14px;
            background: rgba(255, 255, 255, 0.7);
            color: #333;
            transition: all .3s ease;
            flex: 0 0 auto;
        }
        .duration-select {
            width: auto;
            min-width: 80px;
            cursor: pointer;
        }
        .duration-input:focus, .duration-select:focus {
            outline: none;
            border-color: #9b6dff;
            box-shadow: 0 0 0 3px rgba(155, 109, 255, 0.12);
        }
        .duration-input:disabled, .duration-select:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        .badge-expired {
            background: #fff3cd;
            color: #856404;
            padding: 3px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            border: 1px solid #ffe08a;
        }
        @media screen and (max-width: 600px) {
            .duration-row {
                flex-direction: column;
                align-items: stretch;
            }
            .duration-input, .duration-select {
                width: 100%;
            }
        }
        @media screen and (max-width: 768px) {
            .req-panel {
                padding: 20px 15px;
            }
            .req-form {
                max-width: 100%;
            }
            .req-table th, .req-table td {
                padding: 8px 10px;
                font-size: 13px;
            }
            .btn-approve, .btn-reject {
                padding: 4px 10px;
                font-size: 12px;
            }
        }
    </style>
    <script src="js/icons.js?v=2"></script>
    <script src="js/modal.js"></script>
    <script src="js/auth.js"></script>
    <script src="js/permission.js"></script>
    <script src="js/log.js"></script>
</head>
<body onload="document.documentElement.style.opacity=1;checkLogin()">

<header class="header">
    <div class="logo"><span data-ico="lock"></span> 可信数据空间数据共享平台</div>
    <div class="user-info">
        当前用户：
        <span id="username"></span>
        <a href="dataspace.html" class="home-btn">返回主界面</a>
        <button class="logout" onclick="logout()">退出登录</button>
    </div>
</header>

<nav class="nav">
    <a href="dataspace.html">首页</a>
    <a href="upload.html">数据上传</a>
    <a href="data.html">数据查询</a>
    <a href="permission.html">权限管理</a>
    <a href="request.html" class="active">授权申请</a>
    <a href="log.html">访问日志</a>
</nav>

<main class="container">

    <section class="welcome">
        <h1 style="display:flex !important;align-items:center !important;gap:10px !important;"><span data-ico="edit" style="width:28px !important;height:28px !important;display:inline-flex !important;align-items:center !important;justify-content:center !important;flex-shrink:0 !important;"></span> 数据授权申请与审批</h1>
        <p id="roleDesc">体现可信数据空间中数据使用方发起申请、数据管理方审批授权的完整流转过程。</p>
    </section>

    <!-- 普通用户: 提交申请 -->
    <section class="req-panel" id="userPanel" style="display:none;">
        <h2>提交访问申请</h2>
        <div class="req-form">
            <div class="form-group">
                <label class="form-label">数据编号</label>
                <input id="reqDataID" placeholder="例: TDS-1720000000000">
            </div>

            <div class="form-group">
                <label class="form-label">申请原因</label>
                <textarea id="reqReason" placeholder="请说明申请该数据的目的和用途..."></textarea>
            </div>

            <div class="form-group">
                <label class="form-label">授权时长</label>
            <div class="duration-row">
                <label class="duration-opt">
                    <input type="radio" name="durationType" value="permanent" checked onchange="toggleDuration()">
                    <span>永久</span>
                </label>
                <label class="duration-opt">
                    <input type="radio" name="durationType" value="limited" onchange="toggleDuration()">
                    <span>限期</span>
                </label>
                <input type="number" id="reqDuration" min="1" value="1" disabled placeholder="数量" class="duration-input">
                <select id="reqDurationUnit" disabled class="duration-select">
                    <option value="minutes">分钟</option>
                    <option value="hours">小时</option>
                    <option value="days">天</option>
                    <option value="weeks">周</option>
                    <option value="months">月</option>
                    <option value="years">年</option>
                </select>
            </div>

            <button class="primary-btn" onclick="submitRequest()"><span data-ico="upload"></span> 提交申请</button>
            <div id="reqMsg"></div>
        </div>
    </section>

    <!-- 普通用户: 我的申请记录 -->
    <section class="req-panel" id="myRequestsPanel" style="display:none;">
        <h2>我的申请记录</h2>
        <div id="myRequestsContainer">
            <p class="empty-state">加载中...</p>
        </div>
    </section>

    <!-- 管理员: 待审批&全部 -->
    <section class="req-panel" id="adminPanel" style="display:none;">
        <h2>待审批申请</h2>
        <div id="pendingRequestsContainer">
            <p class="empty-state">暂无待审批申请</p>
        </div>
    </section>

    <section class="req-panel" id="adminAllPanel" style="display:none;">
        <h2>全部申请记录</h2>
        <div id="allRequestsContainer">
            <p class="empty-state">暂无申请记录</p>
        </div>
    </section>

</main>

<footer>© 2026 可信数据空间安全与隐私保护研究 Demo</footer>

<script>
// ======================
// 请求管理（本地存储）
// ======================
function getRequests() {
    return JSON.parse(localStorage.getItem("requests") || "[]");
}

function saveRequests(list) {
    localStorage.setItem("requests", JSON.stringify(list));
}

function toggleDuration() {
    const isLimited = document.querySelector('input[name="durationType"][value="limited"]').checked;
    document.getElementById("reqDuration").disabled = !isLimited;
    document.getElementById("reqDurationUnit").disabled = !isLimited;
}

function submitRequest() {
    const user = getCurrentUser();
    if (!user || user.role === "admin") {
        showAlert("管理员无需申请权限");
        return;
    }

    const dataID = document.getElementById("reqDataID").value.trim();
    const reason = document.getElementById("reqReason").value.trim();

    if (!dataID || !reason) {
        showAlert("数据编号和申请原因为必填项");
        return;
    }

    // 检查数据是否存在
    if (!localStorage.getItem(dataID)) {
        document.getElementById("reqMsg").innerHTML =
            '<div class="upload-result" style="color:#e74c3c;"><span class="ico-inline"><span data-ico="cross"></span></span>数据编号 ' + dataID + ' 不存在，请核对后重试</div>';
        return;
    }

    // 检查是否已有待审批的请求
    const requests = getRequests();
    const duplicate = requests.find(
        r => r.dataID === dataID && r.requester === user.username && r.status === "pending"
    );
    if (duplicate) {
        document.getElementById("reqMsg").innerHTML =
            '<div class="upload-result" style="color:#856404;"><span class="ico-inline"><span data-ico="warn"></span></span>您已提交过该数据的访问申请，请等待管理员审批</div>';
        return;
    }

    // 计算授权时长描述
    const isPermanent = document.querySelector('input[name="durationType"][value="permanent"]').checked;
    let durationDesc = "永久";
    if (!isPermanent) {
        const dur = parseInt(document.getElementById("reqDuration").value, 10);
        const unit = document.getElementById("reqDurationUnit").value;
        if (isNaN(dur) || dur < 1) {
            showAlert("请输入有效的授权时长");
            return;
        }
        const unitNames = { minutes: "分钟", hours: "小时", days: "天", weeks: "周", months: "月", years: "年" };
        durationDesc = dur + " " + unitNames[unit];
    }

    const req = {
        id: "REQ-" + Date.now(),
        dataID: dataID,
        requester: user.username,
        reason: reason,
        duration: durationDesc,
        status: "pending",
        createdAt: new Date().toLocaleString(),
        handledBy: null,
        handledAt: null,
        expireTime: null
    };

    requests.push(req);
    saveRequests(requests);

    writeLog("提交访问申请", dataID);

    document.getElementById("reqMsg").innerHTML =
        '<div class="success-msg"><span class="ico-inline"><span data-ico="check"></span></span>访问申请已提交（申请编号: ' + req.id + '），请等待管理员审批</div>';
    document.getElementById("reqDataID").value = "";
    document.getElementById("reqReason").value = "";

    renderMyRequests();
}

// ======================
// 管理员: 审批
// ======================
function approveRequest(reqID) {
    handleRequest(reqID, "approved");
}

function rejectRequest(reqID) {
    handleRequest(reqID, "rejected");
}

function handleRequest(reqID, status) {
    const user = getCurrentUser();
    if (!user || user.role !== "admin") return;

    const requests = getRequests();
    const req = requests.find(r => r.id === reqID);
    if (!req) return;

    req.status = status;
    req.handledBy = user.username;
    req.handledAt = new Date().toLocaleString();

    // 批准时根据申请时长计算过期时间
    if (status === "approved") {
        if (req.duration && req.duration !== "永久") {
            const match = req.duration.match(/^(\d+)\s+(分钟|小时|天|周|月|年)$/);
            if (match) {
                const num = parseInt(match[1], 10);
                const unit = match[2];
                const now = new Date();
                if (unit === "分钟") now.setMinutes(now.getMinutes() + num);
                else if (unit === "小时") now.setHours(now.getHours() + num);
                else if (unit === "天") now.setDate(now.getDate() + num);
                else if (unit === "周") now.setDate(now.getDate() + num * 7);
                else if (unit === "月") now.setMonth(now.getMonth() + num);
                else if (unit === "年") now.setFullYear(now.getFullYear() + num);
                req.expireTime = now.getTime();
            }
        }
    }

    saveRequests(requests);

    if (status === "approved") {
        // 自动创建权限（传入过期时间描述）
        const expireDesc = req.expireTime ? new Date(req.expireTime).toLocaleString() : "永久";
        grantPermission(req.dataID, req.dataID, req.requester, expireDesc);
    }

    writeLog(status === "approved" ? "批准访问申请" : "拒绝访问申请", req.dataID);

    renderAdminView();
}

// 检查并自动更新过期状态
function checkExpiredRequests() {
    const requests = getRequests();
    const now = Date.now();
    let updated = false;
    requests.forEach(r => {
        if (r.status === "approved" && r.expireTime && now > r.expireTime) {
            r.status = "expired";
            updated = true;
        }
    });
    if (updated) saveRequests(requests);
    return updated;
}

// ======================
// 视图渲染
// ======================
function renderMyRequests() {
    const user = getCurrentUser();
    if (!user || user.role !== "user") return;

    const requests = getRequests().filter(r => r.requester === user.username).reverse();
    const container = document.getElementById("myRequestsContainer");

    if (requests.length === 0) {
        container.innerHTML = '<p class="empty-state">暂无申请记录</p>';
        return;
    }

    let html = '<div class="table-wrapper"><table class="req-table"><thead><tr>' +
        '<th>申请编号</th><th>数据编号</th><th>申请原因</th><th>授权时长</th>' +
        '<th>状态</th><th>申请时间</th><th>处理时间</th>' +
        '</tr></thead><tbody>';

    requests.forEach(r => {
        const badge = r.status === "pending" ? "badge-pending" :
            r.status === "approved" ? "badge-approved" :
            r.status === "revoked" ? "badge-revoked" :
            r.status === "expired" ? "badge-expired" : "badge-rejected";
        const statusText = r.status === "pending" ? "待审批" :
            r.status === "approved" ? "已批准" :
            r.status === "revoked" ? "已撤销" :
            r.status === "expired" ? "已过期" : "已拒绝";
        html += '<tr>' +
            '<td>' + r.id + '</td>' +
            '<td>' + r.dataID + '</td>' +
            '<td>' + r.reason + '</td>' +
            '<td>' + (r.duration || "永久") + '</td>' +
            '<td><span class="' + badge + '">' + statusText + '</span></td>' +
            '<td>' + r.createdAt + '</td>' +
            '<td>' + (r.handledAt || "-") + '</td>' +
            '</tr>';
    });

    html += '</tbody></table></div>';
    container.innerHTML = html;
}

function renderAdminView() {
    const requests = getRequests().reverse();

    // 待审批
    const pending = requests.filter(r => r.status === "pending");
    const pendingContainer = document.getElementById("pendingRequestsContainer");
    if (pending.length === 0) {
        pendingContainer.innerHTML = '<p class="empty-state">暂无待审批申请</p>';
    } else {
        let html = '<div class="table-wrapper"><table class="req-table"><thead><tr>' +
            '<th>申请编号</th><th>数据编号</th><th>申请人</th>' +
            '<th>申请原因</th><th>申请时间</th><th>操作</th>' +
            '</tr></thead><tbody>';

        pending.forEach(r => {
            html += '<tr>' +
                '<td>' + r.id + '</td>' +
                '<td>' + r.dataID + '</td>' +
                '<td>' + r.requester + '</td>' +
                '<td>' + r.reason + '</td>' +
                '<td>' + r.createdAt + '</td>' +
                '<td>' +
                '<button class="btn-approve" onclick="approveRequest(\'' + r.id + '\')">批准</button>' +
                '<button class="btn-reject" onclick="rejectRequest(\'' + r.id + '\')">拒绝</button>' +
                '</td>' +
                '</tr>';
        });
        html += '</tbody></table></div>';
        pendingContainer.innerHTML = html;
    }

    // 全部
    const allContainer = document.getElementById("allRequestsContainer");
    if (requests.length === 0) {
        allContainer.innerHTML = '<p class="empty-state">暂无申请记录</p>';
        return;
    }
    let html = '<div class="table-wrapper"><table class="req-table"><thead><tr>' +
        '<th>申请编号</th><th>数据编号</th><th>申请人</th>' +
        '<th>申请原因</th><th>授权时长</th><th>状态</th><th>申请时间</th><th>处理人</th>' +
        '</tr></thead><tbody>';
    requests.forEach(r => {
        const badge = r.status === "pending" ? "badge-pending" :
            r.status === "approved" ? "badge-approved" :
            r.status === "revoked" ? "badge-revoked" :
            r.status === "expired" ? "badge-expired" : "badge-rejected";
        const statusText = r.status === "pending" ? "待审批" :
            r.status === "approved" ? "已批准" :
            r.status === "revoked" ? "已撤销" :
            r.status === "expired" ? "已过期" : "已拒绝";
        html += '<tr>' +
            '<td>' + r.id + '</td>' +
            '<td>' + r.dataID + '</td>' +
            '<td>' + r.requester + '</td>' +
            '<td>' + r.reason + '</td>' +
            '<td>' + (r.duration || "永久") + '</td>' +
            '<td><span class="' + badge + '">' + statusText + '</span></td>' +
            '<td>' + r.createdAt + '</td>' +
            '<td>' + (r.handledBy || "-") + '</td>' +
            '</tr>';
    });
    html += '</tbody></table></div>';
    allContainer.innerHTML = html;
}

// ======================
// 页面初始化
// ======================
window.onload = function() {
    // 检查并更新已过期的申请状态
    checkExpiredRequests();

    const user = getCurrentUser();
    if (user) {
        document.getElementById("username").innerHTML = user.username + " (" + user.role + ")";

        if (user.role === "admin") {
            document.getElementById("roleDesc").innerText = "管理员审批数据访问申请，批准后自动创建授权记录。";
            document.getElementById("adminPanel").style.display = "block";
            document.getElementById("adminAllPanel").style.display = "block";
            renderAdminView();
        } else {
            document.getElementById("roleDesc").innerText = "数据使用方提交访问申请，经管理员审批后可获得数据访问权限。";
            document.getElementById("userPanel").style.display = "block";
            document.getElementById("myRequestsPanel").style.display = "block";

            // 从 URL 参数预填数据编号
            const params = new URLSearchParams(window.location.search);
            const dataID = params.get("dataID");
            if (dataID) {
                document.getElementById("reqDataID").value = dataID;
            }
            renderMyRequests();
        }
    }
};
</script>

</body>
</html>
