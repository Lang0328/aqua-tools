<!DOCTYPE html>
<html lang="zh-CN">


<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
可信数据空间登录
</title>


<link rel="stylesheet" href="css/style.css">


</head>



<body class="login-body">



<div class="login-box">


    <div class="login-title">

        <h1>数据安全共享平台</h1>
        <span class="title-line"></span>
    </div>


    <div class="auth-switch" data-active="login">

        <button type="button" class="auth-tab active" data-target="login" onclick="switchAuth('login')">登录</button>
        <button type="button" class="auth-tab" data-target="register" onclick="switchAuth('register')">注册</button>
        <span class="auth-slider"></span>
    </div>


    <form class="auth-panel active form" id="loginPanel" onsubmit="return false">


        <input
        id="loginUser"
        type="text"
        placeholder="用户名">


        <input
        id="loginPass"
        type="password"
        placeholder="密码">


        <button type="button" onclick="login()">
            登录
        </button>

        <a href="index.html" class="login-home-btn" aria-label="返回工具箱主界面">
            <svg class="home-ico" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/>
            </svg>
            返回主界面
        </a>

        <p id="loginMsg"></p>

        <div class="demo-tip">
            <strong>演示账号</strong>
            <p>管理员：admin / 123456</p>
            <p>普通用户：user / 123456</p>
        </div>

    </form>


    <form class="auth-panel form" id="registerPanel" onsubmit="return false">


        <input
        id="username"
        type="text"
        placeholder="用户名（至少 3 个字符）">


        <input
        id="password"
        type="password"
        placeholder="密码（至少 6 位）">


        <input
        id="confirm"
        type="password"
        placeholder="确认密码">


        <button type="button" onclick="register()">
            注册
        </button>

        <a href="index.html" class="login-home-btn" aria-label="返回工具箱主界面">
            <svg class="home-ico" viewBox="0 0 24 24" width="16" height="16" aria-hidden="true">
                <path fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" d="M15 18l-6-6 6-6"/>
            </svg>
            返回主界面
        </a>

        <p id="message"></p>

        <div class="demo-tip">
            <strong>说明</strong>
            <p>账号仅保存在本地浏览器</p>
            <p>演示账号：admin / 123456</p>
        </div>

    </form>


</div>


<script src="js/login.js"></script>
<script src="js/register.js"></script>


</body>
</html>
